services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: career_ops
      POSTGRES_USER: career_ops
      POSTGRES_PASSWORD: career_ops_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_ops"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  agent:
    build:
      context: ./packages/agent
    environment:
      OTEL_SDK_DISABLED: "true"
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://career_ops:career_ops_pass@postgres:5432/career_ops
      AGENT_SERVICE_URL: http://agent:8000
    volumes:
      - app_data:/app/data
      - ./reports:/app/reports
      - ./config:/app/config
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - '8080:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pg_data:
  app_data:
